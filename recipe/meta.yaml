{% set name = "evidently" %}
{% set version = "0.7.21" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/evidentlyai/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 9f18fe8f6bf86309faa4cb5df0f79d703be492b08bdbf38e8d8ad292cd9c71af

build:
  number: 0
  skip: true  # [py<310 or py>313]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - evidently=evidently.cli:app

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    # https://github.com/evidentlyai/evidently/blob/v0.7.21/pyproject.toml#L29-L55
    - plotly >=5.10.0,<6
    - statsmodels >=0.14.0
    - scikit-learn >=1.1.1
    - pandas >=1.3.5
    - pyarrow >=10.0.1  # pandas[parquet] extra
    - numpy >=1.23.0
    - nltk >=3.6.7
    - scipy >=1.10.0
    - requests >=2.32.0
    - pyyaml >=6.0.1
    - pydantic >=1.10.16
    - litestar >=2.19.0
    - typing_inspect >=0.9.0
    - uvicorn >=0.22.0
    - uvicorn-standard >=0.22.0  # uvicorn[standard] extras
    - watchdog >=3.0.0
    - typer >=0.3
    - rich >=13
    - iterative-telemetry >=0.0.5
    - dynaconf >=3.2.4
    - certifi >=2024.7.4
    - urllib3 >=1.26.19
    - fsspec >=2024.9.0
    - ujson >=5.4.0
    - deprecation >=2.1.0
    - uuid6 >=2024.7.10
    - cryptography >=43.0.1
    - opentelemetry-proto >=1.25.0
  # https://github.com/evidentlyai/evidently/blob/v0.7.21/pyproject.toml#L57-L79
  run_constrained:
    - openai >=1.16.2
    - evaluate >=0.4.1
    - sentence-transformers >=2.7.0
    - transformers >=4.39.3
    - accelerate >=0.26.0
    - pyspark >=3.4.0,<4
    - s3fs >=2024.9.0
    - gcsfs >=2024.9.0
    - litellm >=1.74.3
    - llama-index >=0.10
    - faiss-cpu >=1.8.0
    - alembic >=1.13.0
    - psycopg2 >=2.9.0
    - sqlalchemy >=2.0.0

{% set tests_to_ignore = "--ignore=tests/spark" %}                          # requires pyspark
{% set tests_to_ignore = tests_to_ignore + " --ignore=tests/test_torch_numpy.py" %}  # requires pytorch
{% set tests_to_ignore = tests_to_ignore + " --ignore=tests/future/test_ui" %}       # requires sqlalchemy
{% set tests_to_ignore = tests_to_ignore + " --ignore=tests/ui/test_tracing_storage.py" %}  # requires sqlalchemy

test:
  source_files:
    - tests
  imports:
    - evidently
  requires:
    - pip
    - pytest
    - pytest-asyncio
    - pytest-timeout
  commands:
    - pip check
    - evidently --help
    - pytest tests/ {{ tests_to_ignore }} -x -v --timeout=300

about:
  home: https://github.com/evidentlyai/evidently
  dev_url: https://github.com/evidentlyai/evidently
  doc_url: https://docs.evidentlyai.com/
  summary: Analyze, monitor, and debug machine learning model in production.
  description: |
    Evidently is an open-source Python library for data scientists and ML engineers.
    It helps evaluate, test, and monitor ML models from validation to production.
    It provides 100+ built-in metrics for data drift detection, model performance
    tracking, and LLM-specific monitoring.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
